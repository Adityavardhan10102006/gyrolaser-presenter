<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GyroLaser - Cinematic Presentation</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Scene 1: 3D Minimal Desk -->
    <div id="scene1" class="scene active">
        <canvas id="deskCanvas"></canvas>
        <div id="startPrompt" class="prompt-text">Click anywhere to begin</div>
    </div>

    <!-- Scene 2: BIOS Boot -->
    <div id="scene2" class="scene">
        <div id="biosContainer">
            <div id="biosLogs"></div>
            <div id="biosCursor" class="blinking-cursor">_</div>
        </div>
    </div>

    <!-- Scene 3: Main System UI -->
    <div id="scene3" class="scene">
        
        <!-- Top Navigation Bar -->
        <nav class="top-nav">
            <div class="nav-left">
                <span class="logo">GL//OS</span>
                <span class="room-pill">
                    Room: <strong id="roomIdText">-----</strong>
                </span>
            </div>
            <div class="nav-center">
                <div id="connectionStatus" class="status-indicator">
                    <span class="dot"></span>
                    <span class="text">Waiting for connection...</span>
                </div>
            </div>
            <div class="nav-right">
                <label for="fileUpload" class="upload-btn">
                    Upload File
                </label>
                <input type="file" id="fileUpload" accept=".pdf,.docx,.ppt,.pptx" />
            </div>
        </nav>

        <!-- Presentation Canvas Area -->
        <div id="presentationArea" class="presentation-area">
            <div class="empty-state" id="emptyState">
                <h3>No Document Loaded</h3>
                <p>Upload a PDF or DOCX to start presenting</p>
                <p class="small-text">Use arrow keys to navigate pages once loaded.</p>
            </div>
            
            <canvas id="pdfCanvas" class="hidden"></canvas>
            
            <!-- DOCX/HTML Container -->
            <div id="htmlCanvas" class="hidden" style="width: 80%; height: 80%; overflow-y: auto; background: white; color: black; padding: 2rem; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);"></div>
            
            <div id="slideCounterLabel" class="slide-counter hidden">
                <span id="pageNum">0</span> / <span id="pageCount">0</span>
            </div>

            <!-- Laser Pointer (Physical Glow) -->
            <div id="laserDot" class="laser-dot">
                <div class="laser-core"></div>
                <div class="laser-halo"></div>
            </div>
            <div id="laserTrailContainer"></div>
        </div>
        
    </div>

    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <!-- Setting the worker src for PDF.js -->
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>
    <!-- Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    
    <!-- Application Logic -->
    <script src="app.js"></script>
</body>
</html>
