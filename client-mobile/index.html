<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Prevent scaling on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>GyroLaser - Controller</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <header class="header">
            <h1 class="logo">GL//OS</h1>
            <p class="subtitle">Mobile Controller</p>
        </header>

        <div id="connectionPanel" class="panel">
            <h2>Connect to Room</h2>
            <div class="input-group">
                <input type="text" id="roomIdInput" placeholder="ENTER 6 DIGIT ROOM ID" autocomplete="off" autocorrect="off">
            </div>
            <button id="connectBtn" class="btn primary-btn">Initialize Link</button>
            <div id="statusIndicator" class="status">
                <span class="dot"></span>
                <span id="statusText">Disconnected</span>
            </div>
        </div>

        <div id="controlPanel" class="panel hidden">
            <h2>Laser Control</h2>
            
            <button id="permissionBtn" class="btn action-btn">Calibrate Gyroscope</button>

            <div id="activeControls" class="hidden">
                <div class="hud">
                    <div class="hud-item">
                        <span>X-Axis</span>
                        <strong id="valX">0.0</strong>
                    </div>
                    <div class="hud-item">
                        <span>Y-Axis</span>
                        <strong id="valY">0.0</strong>
                    </div>
                </div>

                <div class="slider-group">
                    <label for="sensitivitySlider">Sensitivity: <span id="sensValue">1.0</span>x</label>
                    <input type="range" id="sensitivitySlider" min="0.5" max="3" step="0.1" value="1.0">
                </div>

                <button id="disconnectBtn" class="btn danger-btn">Disconnect</button>
            </div>
        </div>
    </div>

    <!-- Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="gyro.js"></script>
</body>
</html>
